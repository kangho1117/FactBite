<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FactBite – 한입 크기 상식</title>
  <meta name="description" content="매일 새로운 상식을 한입 크기로! FactBite에서 유익하고 신기한 지식을 만나보세요." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <!-- Vercel Speed Insights -->
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="app-container">
    <!-- Header -->
    <header class="header" id="header">
      <div class="logo">
        <span class="logo-icon">💡</span>
        <span class="logo-text">FactBite</span>
      </div>
    </header>

    <!-- Card -->
    <main class="card-area">
      <div class="card" id="card">
        <div class="card-badge" id="card-badge">
          <span class="badge-icon">📚</span>
          <span class="badge-text" id="badge-text">상식</span>
        </div>
        <div class="card-number" id="card-number">#1</div>
        <p class="card-content" id="card-content">로딩 중...</p>

        <!-- Feedback Actions -->
        <div class="card-actions">
          <button class="action-btn action-btn--like" id="btn-like" aria-label="좋아요">
            <span class="action-icon">🤍</span>
            <span class="action-count" id="like-count">0</span>
          </button>
          <button class="action-btn action-btn--share" id="btn-share" aria-label="공유하기">
            <span class="action-icon">🔗</span>
            <span class="action-label">공유</span>
          </button>
        </div>

        <!-- Detail Section -->
        <div class="card-detail" id="card-detail">
          <div class="detail-divider"></div>
          <p class="detail-text" id="detail-text"></p>
        </div>
      </div>

      <!-- Buttons -->
      <div class="button-group">
        <button class="btn btn--prev" id="btn-prev">
          <span class="btn-icon">←</span>
          <span>이전</span>
        </button>
        <button class="btn btn--detail" id="btn-detail">
          <span class="btn-icon">🔍</span>
          <span>자세히</span>
        </button>
        <button class="btn btn--next" id="btn-next">
          <span>다음</span>
          <span class="btn-icon">→</span>
        </button>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>매일 새로운 지식을 한입 크기로 🍿</p>
    </footer>
  </div>

  <div class="toast" id="toast">링크가 복사되었습니다!</div>

  <script src="supabase.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
